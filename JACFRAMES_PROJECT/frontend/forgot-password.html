<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - JACFRAMES</title>
  <style>
    /* Use the same styling as login.html for consistency */
    body {
      margin: 0; padding: 0; min-height: 100vh;
      background-image: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('money.jpg');
      background-size: cover; background-position: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white; display: flex; justify-content: center; align-items: center;
    }
    .auth-container {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px; border-radius: 15px;
        width: 100%; max-width: 400px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        text-align: center;
    }
    .form-group { text-align: left; margin-bottom: 20px; }
    .form-group label { display: block; color: #00a8e8; margin-bottom: 8px; font-weight: bold;}
    input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
    .submit-btn { background: #00a8e8; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Set New Password</h2>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Enter new password">
    </div>
    <button class="submit-btn" onclick="submitNewPassword()">Update Password</button>
  </div>

  <script>
    async function submitNewPassword() {
      const newPassword = document.getElementById('newPassword').value;
      // Get the token from the URL
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) return alert("Invalid reset link.");

      try {
        const res = await fetch('http://localhost:5000/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();
        if (res.ok) {
          alert("Password updated! Please login.");
          window.location.href = 'login.html';
        } else {
          alert(data.msg);
        }
      } catch (err) { alert("Server error."); }
    }
  </script>
</body>
</html>
