<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - JACFRAMES INNOVATION</title>
    <style>
      /* BACKGROUND STYLING */
      body {
        margin: 0; padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url("money.jpg");
        background-size: cover; background-position: center; background-attachment: fixed;
      }
      /* GLASS-MORPHISM CONTAINER */
      .auth-container {
        background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); border-radius: 20px;
        padding: 40px; width: 100%; max-width: 400px; color: white; text-align: center;
      }
      .header-section h2 { margin: 0; color: #ffffff; letter-spacing: 1.5px; font-size: 1.8rem; }
      .header-section h4 { margin: 5px 0; color: #00a8e8; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; }
      .header-section p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 30px; }
      /* TOGGLE BUTTONS */
      .auth-toggle { display: flex; background: rgba(0, 0, 0, 0.3); padding: 5px; border-radius: 30px; margin-bottom: 30px; }
      .auth-toggle button { flex: 1; background: none; border: none; color: white; padding: 10px; cursor: pointer; font-weight: 600; border-radius: 25px; transition: 0.3s; }
      .auth-toggle button.active { background: #00a8e8; box-shadow: 0 4px 15px rgba(0, 168, 232, 0.4); }
      /* FORM STYLING */
      .form-group { text-align: left; margin-bottom: 20px; }
      .form-group label { display: block; font-size: 0.8rem; margin-bottom: 8px; font-weight: 600; color: #00a8e8; }
      .form-group input { width: 100%; padding: 12px 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
      .form-group input:focus { border-color: #00a8e8; background: rgba(255, 255, 255, 0.2); }
      .input-error { border: 1px solid #ff4d4d !important; background: rgba(255, 77, 77, 0.1) !important; }
      .submit-btn { width: 100%; padding: 14px; background: #00a8e8; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
      .submit-btn:hover { background: #0086b9; transform: translateY(-2px); }
      .forgot-link { display: block; margin-top: 15px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.7); text-decoration: none; transition: 0.3s; cursor: pointer; }
      .forgot-link:hover { color: #00a8e8; }
      .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
      ::placeholder { color: rgba(255, 255, 255, 0.4); }
    </style>
  </head>
  <body>
    <div id="resetModal" class="modal-overlay">
      <div class="auth-container" style="background: #1a1a1a; border: 1px solid #333">
        <h3>Reset Password</h3>
        <p>Enter your Gmail to receive a code.</p>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="resetEmail" placeholder="example@gmail.com" />
        </div>
        <button type="button" class="submit-btn" onclick="handleSendOTP()">Send Code</button>
        <button type="button" class="forgot-link" style="border: none; background: none; width: 100%; margin-top: 10px;" onclick="closeReset()">Cancel</button>
      </div>
    </div>

    <div class="auth-container">
      <div class="header-section">
        <h2>JACFRAMES INNOVATION</h2>
        <h4>STUDENT Cash Loan</h4>
        <p id="authSubtitle">Login to manage your student loans</p>
      </div>

      <div class="auth-toggle">
        <button id="loginTab" class="active" onclick="toggleAuth('login')">Login</button>
        <button id="signupTab" onclick="toggleAuth('signup')">Sign Up</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="example@gmail.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="button" class="submit-btn" onclick="handleLogin()">Login</button>
        <span class="forgot-link" onclick="openReset()">Forgot Password?</span>
      </form>

      <form id="signupForm" style="display: none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Jackson Nsonga" required />
        </div>
        <div class="form-group">
          <label>Gmail Address</label>
          <input type="email" id="signupEmail" placeholder="name@gmail.com" required />
        </div>
        <div class="form-group">
          <label>Student ID (SIN)</label>
          <input type="text" id="signupSin" placeholder="23-------" required />
        </div>
        <div class="form-group">
          <label>Create Password</label>
          <input type="password" id="signupPassword" placeholder="••••••••" required />
        </div>
        <button type="button" class="submit-btn" onclick="handleSignup()">Create Account</button>
      </form>
    </div>

    <script>
    

const API_URL = "https://jacframes-innovation-loan-form.onrender.com"; 

      function toggleAuth(type) {
        const loginF = document.getElementById("loginForm");
        const signupF = document.getElementById("signupForm");
        const loginTab = document.getElementById("loginTab");
        const signupTab = document.getElementById("signupTab");
        const sub = document.getElementById("authSubtitle");

        if (type === "login") {
          loginF.style.display = "block";
          signupF.style.display = "none";
          loginTab.classList.add("active");
          signupTab.classList.remove("active");
          sub.innerText = "Login to manage your student loans";
        } else {
          loginF.style.display = "none";
          signupF.style.display = "block";
          signupTab.classList.add("active");
          loginTab.classList.remove("active");
          sub.innerText = "Join JACFRAMES for instant student credit";
        }
      }

      function validateGmail(emailId) {
        const emailInput = document.getElementById(emailId);
        const emailValue = emailInput.value.toLowerCase();
        if (!emailValue.endsWith("@gmail.com")) {
          emailInput.classList.add("input-error");
          alert("Please use a valid @gmail.com address.");
          return false;
        }
        emailInput.classList.remove("input-error");
        return true;
      }

      async function handleLogin() {
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        if (!email || !password) return alert("Please fill all fields");

        try {
          const response = await fetch(`${API_URL}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
          const data = await response.json();
          if (response.ok) {
            localStorage.setItem("token", data.token);
            // FIX: Save user data to localStorage so it persists on the dashboard
            localStorage.setItem("user", JSON.stringify(data.user)); 
            window.location.href = "dashboard.html";
          } else {
            alert(data.msg || "Login failed");
          }
        } catch (err) { alert("Cannot connect to the server."); }
      }

      async function handleSignup() {
        if (!validateGmail("signupEmail")) return;
        const name = document.getElementById("signupName").value;
        const email = document.getElementById("signupEmail").value;
        const sin = document.getElementById("signupSin").value;
        const password = document.getElementById("signupPassword").value;
        if (!name || !email || !sin || !password) return alert("Please fill all fields");

        try {
          const response = await fetch(`${API_URL}/api/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, sin, password }),
          });
          const data = await response.json();
          if (response.ok) {
            alert("Account created! Please login.");
            toggleAuth("login");
          } else { alert(data.msg || "Registration failed"); }
        } catch (err) { alert("Server error."); }
      }

      async function handleSendOTP() {
        const email = document.getElementById("resetEmail").value;
        if (!validateGmail("resetEmail")) return;

        try {
          const response = await fetch(`${API_URL}/api/auth/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          const data = await response.json();
          if (response.ok) {
            localStorage.setItem("resetEmail", email);
            window.location.href = "verify-otp.html";
          } else {
            alert(data.msg || "Error sending OTP");
          }
        } catch (err) { alert("Connection error."); }
      }

      function openReset() { document.getElementById("resetModal").style.display = "flex"; }
      function closeReset() { document.getElementById("resetModal").style.display = "none"; }
    </script>
  </body>
</html>
